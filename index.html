<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FinDash — современная финтех-аналитическая панель для мониторинга выручки, пользователей и транзакций.">
    <title>FinDash — Аналитика платформы</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon"><i class="ph ph-chart-line-up"></i></span>
                <span class="logo-text">FinDash<span class="logo-dot">.</span></span>
            </div>
            <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Закрыть меню">
                <i class="ph ph-x"></i>
            </button>
        </div>

        <nav class="sidebar-nav">
            <ul class="nav-list" id="navList">
                <li class="nav-item active" data-page="overview">
                    <a href="#" class="nav-link">
                        <i class="ph ph-squares-four"></i>
                        <span>Обзор</span>
                    </a>
                </li>
                <li class="nav-item" data-page="analytics">
                    <a href="#" class="nav-link">
                        <i class="ph ph-chart-bar"></i>
                        <span>Аналитика</span>
                    </a>
                </li>
                <li class="nav-item" data-page="transactions">
                    <a href="#" class="nav-link">
                        <i class="ph ph-arrows-left-right"></i>
                        <span>Транзакции</span>
                    </a>
                </li>
                <li class="nav-item" data-page="wallets">
                    <a href="#" class="nav-link">
                        <i class="ph ph-wallet"></i>
                        <span>Кошельки</span>
                    </a>
                </li>
                <li class="nav-item" data-page="settings">
                    <a href="#" class="nav-link">
                        <i class="ph ph-gear"></i>
                        <span>Настройки</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile-wrapper">
                <div class="user-profile" id="userProfileBtn">
                    <div class="user-avatar">
                        <i class="ph-fill ph-user"></i>
                    </div>
                    <div class="user-info">
                        <span class="user-name">Алексей С.</span>
                        <span class="user-role">Администратор</span>
                    </div>
                    <button class="user-menu-btn" id="userMenuBtn" aria-label="Меню пользователя">
                        <i class="ph ph-dots-three"></i>
                    </button>
                </div>
                <!-- Profile Dropdown -->
                <div class="dropdown-menu dropdown-profile" id="profileDropdown">
                    <a href="#" class="dropdown-item" id="profileViewBtn">
                        <i class="ph ph-user-circle"></i>
                        <span>Просмотр профиля</span>
                    </a>
                    <a href="#" class="dropdown-item" id="profilePlanBtn">
                        <i class="ph ph-crown"></i>
                        <span>Сменить тариф</span>
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="#" class="dropdown-item dropdown-item-danger" id="profileLogoutBtn">
                        <i class="ph ph-sign-out"></i>
                        <span>Выйти</span>
                    </a>
                </div>
            </div>
        </div>
    </aside>

    <!-- Sidebar Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">

        <!-- Top Header (persistent across all pages) -->
        <header class="top-header">
            <div class="header-left">
                <button class="hamburger-btn" id="hamburgerBtn" aria-label="Открыть меню">
                    <i class="ph ph-list"></i>
                </button>
                <h1 class="page-title" id="pageTitle">Аналитика платформы</h1>
            </div>
            <div class="header-right">
                <div class="search-box" id="searchBox">
                    <i class="ph ph-magnifying-glass search-icon"></i>
                    <input type="text" class="search-input" id="searchInput" placeholder="Поиск по транзакциям...">
                </div>
                <div class="notification-wrapper">
                    <button class="notification-btn" id="notificationBtn" aria-label="Уведомления">
                        <i class="ph ph-bell"></i>
                        <span class="notification-badge"></span>
                    </button>
                    <!-- Notification Dropdown -->
                    <div class="dropdown-menu dropdown-notifications" id="notificationDropdown">
                        <div class="dropdown-header">
                            <span>Уведомления</span>
                            <span class="dropdown-badge">3</span>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a href="#" class="dropdown-item notification-item">
                            <span class="notification-dot dot-success"></span>
                            <div class="notification-content">
                                <span class="notification-text">Транзакция успешна!</span>
                                <span class="notification-time">2 мин назад</span>
                            </div>
                        </a>
                        <a href="#" class="dropdown-item notification-item">
                            <span class="notification-dot dot-warning"></span>
                            <div class="notification-content">
                                <span class="notification-text">Вход с нового устройства</span>
                                <span class="notification-time">15 мин назад</span>
                            </div>
                        </a>
                        <a href="#" class="dropdown-item notification-item">
                            <span class="notification-dot dot-primary"></span>
                            <div class="notification-content">
                                <span class="notification-text">Промокод активирован</span>
                                <span class="notification-time">1 час назад</span>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Dynamic Page Content Area -->
        <div id="pageContent">
            <!-- Content is injected by JS -->
        </div>

    </main>

</div>

<script src="js/script.js"></script>
</body>
</html>
